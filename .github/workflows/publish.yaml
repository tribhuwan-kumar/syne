name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-rust:
    name: Build Rust Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: metrics
            output_name: metrics-linux-x86_64
            use_cross: false
            features: "--features gpu"
            
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary_name: metrics
            output_name: metrics-linux-aarch64
            use_cross: false
            features: ""

          - os: ubuntu-latest
            target: x86_64-pc-windows-gnu
            binary_name: metrics.exe
            output_name: metrics-windows-x86_64.exe
            use_cross: true
            features: "--features gpu"

          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: metrics
            output_name: metrics-macos-aarch64
            use_cross: false
            features: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux GNU cross-compilation or specialized targets
      - name: Install target dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest' && matrix.use_cross == false
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools

      - name: Install Cross
        if: matrix.use_cross == true
        run: cargo install cross

      - name: Run Build (Cargo)
        if: matrix.use_cross == false
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Run Build (Cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Prepare Artifact
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} staging/${{ matrix.output_name }}

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4 
        with:
          name: ${{ matrix.output_name }}
          path: staging/${{ matrix.output_name }}
          retention-days: 1

  # Build Flutter and Publish Release
  release:
    name: Build Flutter APK & Deploy
    needs: build-rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history to parse commit messages correctly

      - name: Download all Rust artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets/bin
          merge-multiple: true

      - name: Verify Binary Placements
        run: |
          ls -la assets/bin/

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Build Flutter APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Generate Release Description (Changelog)
        id: changelog
        run: |
          # Grabs commit messages between the current tag and the previous tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found. Logging all commits up to now."
            git log --oneline > changelog.txt
          else
            echo "Generating changelog between $PREVIOUS_TAG and ${{ github.ref_name }}"
            git log ${PREVIOUS_TAG}..${{ github.ref_name }} --oneline > changelog.txt
          fi
          
          # Escape formatting for GitHub Actions environment variable mapping
          EOF=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "BODY<<$EOF" >> $GITHUB_OUTPUT
          cat changelog.txt >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.BODY }}
          draft: false
          prerelease: false
          files: |
            build/app/outputs/flutter-apk/app-release.apk

